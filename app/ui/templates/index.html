<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Ticket Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container { max-width: 700px; width: 100%; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; }
    label { display: block; font-weight: 600; margin-bottom: .4rem; }
    textarea {
      width: 100%;
      height: 140px;
      padding: .75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: .95rem;
      resize: vertical;
    }
    button {
      margin-top: .75rem;
      padding: .6rem 1.4rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .95rem;
      cursor: pointer;
    }
    button:disabled { background: #93c5fd; cursor: default; }
    #error {
      margin-top: 1rem;
      padding: .75rem;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      color: #b91c1c;
      display: none;
    }
    #result {
      margin-top: 1.5rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.25rem;
      display: none;
    }
    #result h2 { font-size: 1rem; margin-bottom: 1rem; color: #555; }
    .field { margin-bottom: .75rem; }
    .field .key {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #666;
    }
    .field .value { margin-top: .2rem; font-size: .95rem; }
    .badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 4px;
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-bug      { background: #fee2e2; color: #b91c1c; }
    .badge-billing  { background: #fef9c3; color: #854d0e; }
    .badge-feature_request { background: #dbeafe; color: #1d4ed8; }
    .badge-question { background: #dcfce7; color: #166534; }
    .badge-other    { background: #f3f4f6; color: #374151; }
    .badge-low      { background: #dcfce7; color: #166534; }
    .badge-medium   { background: #fef9c3; color: #854d0e; }
    .badge-high     { background: #fee2e2; color: #b91c1c; }
    .badge-review-yes { background: #fef3c7; color: #92400e; }
    .badge-review-no  { background: #f0fdf4; color: #166534; }
    #fallback-warning {
      margin-top: .75rem;
      padding: .65rem .9rem;
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: 6px;
      color: #9a3412;
      font-size: .9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎫 Support Ticket Classifier</h1>

    <label for="message">Support message</label>
    <textarea id="message" placeholder="Paste or type the support message here…"></textarea>
    <button id="submit-btn">Classify</button>

    <div id="error"></div>

    <div id="result">
      <h2>Classification result</h2>
      <div class="field">
        <div class="key">Category</div>
        <div class="value"><span id="r-category" class="badge"></span></div>
      </div>
      <div class="field">
        <div class="key">Priority</div>
        <div class="value"><span id="r-priority" class="badge"></span></div>
      </div>
      <div class="field">
        <div class="key">Human review needed</div>
        <div class="value"><span id="r-review" class="badge"></span></div>
      </div>
      <div class="field">
        <div class="key">Summary</div>
        <div class="value" id="r-summary"></div>
      </div>
      <div class="field">
        <div class="key">Suggested reply</div>
        <div class="value" id="r-reply"></div>
      </div>
    </div>
    <div id="fallback-warning">
      ⚠️ <strong>Classification unavailable.</strong>
      The AI provider returned an error. This is a fallback response — please review manually.
    </div>
  </div>

  <script>
    const btn = document.getElementById('submit-btn');
    const msgEl = document.getElementById('message');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');

    btn.addEventListener('click', async () => {
      const message = msgEl.value.trim();
      errorEl.style.display = 'none';
      resultEl.style.display = 'none';

      if (!message) {
        showError('Please enter a support message before classifying.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Classifying…';

      try {
        const resp = await fetch('/api/classify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          showError(`Error ${resp.status}: ${body.detail || resp.statusText}`);
          return;
        }

        const data = await resp.json();
        renderResult(data);
      } catch (err) {
        showError('Network error — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Classify';
      }
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function renderResult(d) {
      setBadge('r-category', d.category, `badge-${d.category}`);
      setBadge('r-priority', d.priority, `badge-${d.priority}`);

      const reviewEl = document.getElementById('r-review');
      reviewEl.textContent = d.needs_human_review ? 'Yes' : 'No';
      reviewEl.className = `badge ${d.needs_human_review ? 'badge-review-yes' : 'badge-review-no'}`;

      document.getElementById('r-summary').textContent = d.summary;
      document.getElementById('r-reply').textContent = d.suggested_reply;
      resultEl.style.display = 'block';

      const warningEl = document.getElementById('fallback-warning');
      warningEl.style.display = d.is_fallback ? 'block' : 'none';
    }

    function setBadge(id, text, cssClass) {
      const el = document.getElementById(id);
      el.textContent = text.replace(/_/g, ' ');
      el.className = `badge ${cssClass}`;
    }
  </script>
</body>
</html>
